<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MindEase 🧠</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="chat-container">
    <h1>🧘 MindEase</h1>
    <p class="tagline">A gentle place for your thoughts 💙</p>

    <div class="chat-box">
        {% for msg in chat %}
            <div class="user-msg">🙂 You: {{ msg.user }}</div>
            <div class="bot-msg">🤖 MindEase: {{ msg.bot }}</div>
        {% endfor %}
    </div>

    <form method="POST" class="input-area">
        <input type="text" name="message" placeholder="Tell me what’s on your mind 💭" required>
        <button type="submit">Send 💬</button>
    </form>

    <p class="warning">⚠ Emotional support only — not medical advice</p>
</div>

</body>
</html>
